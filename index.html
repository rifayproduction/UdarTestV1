<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ударения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="hero" aria-label="Главный экран">
      <div class="brand-mark">У</div>
      <h1>Ударения</h1>
      <p>Русского языка</p>
    </section>

    <section class="center-stage">
      <button class="start-button" type="button">Начать тест</button>
    </section>
  </main>

  <nav class="tab-bar" aria-label="Навигация">
    <button class="tab-item active" type="button">
      <span class="tab-icon" aria-hidden="true">Т</span>
      <span>Тест</span>
    </button>
    <button class="tab-item" type="button">
      <span class="tab-icon" aria-hidden="true">★</span>
      <span>Избранное</span>
    </button>
    <button class="tab-item" type="button">
      <span class="tab-icon" aria-hidden="true">А</span>
      <span>Словарь</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
